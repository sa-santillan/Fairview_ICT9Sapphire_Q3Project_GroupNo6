        <div class="collapse navbar-collapse" id="navbarNav">

    <div class="container bg-dark text-light p-4 mt-5 rounded w-75">
        <details>
            <summary>Instructions:</summary>
            <p id="Instruct" class="text-center">In order to create and register an account, please fill out the details below.</p>
        </details>

        <div class="row mt-4">
           
            <div class="col-lg text-center">
                <h4 class="text-center mb-4 ">Registration Form </h4>

                <form id="pickupForm">
                    <label>First Name (required):</label>
                    <input type="text" class="form-control mb-2" placeholder="Enter your first name" required autocomplete="off">

                    <label>Last Name (required):</label>
                    <input type="text" class="form-control mb-2" placeholder="Enter your last name" required autocomplete="off">

                    <label>Phone (required):</label>
                    <input type="text" class="form-control mb-2" placeholder="e.g., 0917-123-4567" required autocomplete="off">

                    <input type="checkbox" class="form-check-input" id="TermsandAgreement" required>
                    <label class="form-check-label" for="TermsandAgreement">
                        I have read and agree to the <a href="#">Terms and Conditions</a>
                    </label>
            
                    <br>
                    <button type="submit" class="btn btn-success me-2">Submit</button>
                    <button type="reset" class="btn btn-danger">Clear</button>
                </form>
            </div>
        </div>
    </div>
