<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="box text-white p-5 rounded-4 shadow-lg">
                <h2 class="text-center mb-4 fw-bold">Fare Calculator</h2>
                    <details class="mb-4">
                        <summary>Quick Instructions</summary>
                            <p id="Instruct"></p>
                                    </details>
                
            

                <div class="mb-4">
                    <label class="form-label fw-bold">From:</label>
                    <select class="form-select form-select-lg" id="pickup" required>
                        <option selected disabled>Select pickup station</option>
                        <option value="0">Quezon Avenue</option>
                        <option value="1">Cubao</option>
                        <option value="2">Ortigas</option>
                        <option value="3">Makati</option>
                        <option value="4">Buendia</option>
                        <option value="5">Magallanes</option>
                        <option value="6">Taft Avenue</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">To:</label>
                    <select class="form-select form-select-lg" id="dropoff" required>
                        <option selected disabled>Select dropoff station</option>
                        <option value="0">Quezon Avenue</option>
                        <option value="1">Cubao</option>
                        <option value="2">Ortigas</option>
                        <option value="3">Makati</option>
                        <option value="4">Buendia</option>
                        <option value="5">Magallanes</option>
                        <option value="6">Taft Avenue</option>
                    </select>
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="disc">
                    <label class="form-check-label" for="disc">Apply Student/Senior Discount (20%)</label>
                </div>

                <div class="text-center">
                    <button id="calcFare" class="btn btn-primary-custom btn-lg w-100 mb-4">Calculate Fare</button>
                    <div class="py-3 border-top border-secondary">
                        <span class="text-uppercase opacity-50 small tracking-widest">Total Fare</span>
                        <p id="DisplayAns" class="mb-0">₱0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Instructions
    const instructEl = document.getElementById('Instruct');
    if(instructEl) {
        instructEl.innerHTML = "Select your start and end points to see the estimated cost. Discounts apply to valid Student, Senior, or PWD IDs.";
    }

    document.getElementById('calcFare').addEventListener('click', function() {
        let pickupVal = document.getElementById("pickup").value;
        let dropoffVal = document.getElementById("dropoff").value;

        // 2. Check if both are selected    
        if (pickupVal === "" || dropoffVal === "" || pickupVal === "Select pickup station") {
            alert("Please select both stations!");
            return;
        }

        // 3. Prevent same station travel
        if (pickupVal === dropoffVal) {
            alert("Please select different stations for pickup and dropoff.");
            return;
        }

        let pickup = parseFloat(pickupVal);
        let dropoff = parseFloat(dropoffVal);

        let basefare = 50;    
        let perKMrate = 15;    
        let baseKM = 2;        
        let isDiscounted = document.getElementById("disc").checked;

        let distance = Math.abs(dropoff - pickup);
        let extraM = Math.max(distance - baseKM, 0);

        let totalFare = basefare + (extraM * perKMrate);
        
        if (isDiscounted) {
            totalFare = totalFare * 0.8; 
        }

        document.getElementById("DisplayAns").innerHTML = "₱" + totalFare.toFixed(2);
    });
</script>
