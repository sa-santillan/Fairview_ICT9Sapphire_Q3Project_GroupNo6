        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        <div class="collapse navbar-collapse" id="navbarNav">

     <div class="container bg-dark text-light p-4 mt-5 rounded w-75">
        <details>
            <summary>Instructions:</summary>
            <p id="Instruct" class="text-center"></p>
        </details>

        <div class="row mt-4">
           
            <div class="col-lg text-center mb-4">
                <br>
                <br>
                <label>Select Pickup Station:</label>
                    <select class="form-select mb-3" id="pickup" required autocomplete="off">
                        <option selected disabled>Select your pickup station</option>
                        <option value="0">Quezon Avenue</option>
                        <option value="1">Cubao</option>
                        <option value="2">Ortigas</option>
                        <option value="3">Makati</option>
                        <option value="4">Buendia</option>
                        <option value="5">Magallanes</option>
                        <option value="6">Taft Avenue</option>
                    </select>

                     <label>Select Drop off Station:</label>
                    <select class="form-select mb-3" id="dropoff" required autocomplete="off">
                        <option selected disabled>Select your dropoff station</option>
                        <option value="0">Quezon Avenue</option>
                        <option value="1">Cubao</option>
                        <option value="2">Ortigas</option>
                        <option value="3">Makati</option>
                        <option value="4">Buendia</option>
                        <option value="5">Magallanes</option>
                        <option value="6">Taft Avenue</option>
                    </select>

                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="disc">
                    <label class="form-check-label" for="disc">Apply 20% discount</label>
                </div>

                <button id="calcFare" class="btn btn-primary">Calculate Fare</button>
                <p id="DisplayAns" class="mt-3">₱0.00</p>
            </div>

    <script>
        
        document.getElementById('Instruct').innerHTML = "Please use this website as a fare guide for your future trips!";

    
        document.getElementById('calcFare').addEventListener('click', function() {
            
    
            let pickup = parseFloat(document.getElementById("pickup").value);
            let dropoff = parseFloat(document.getElementById("dropoff").value);
            
            
            let basefare = 50;     // Initial cost
            let perKMrate = 15;    // Cost per kilometer after the base distance
            let baseKM = 2;        // Distance in the base fare
            
        
            let discount = document.getElementById("disc").checked ? 1 : 0;
            
            // Calculate distance between stations
            let distance = Math.max(Math.abs(dropoff - pickup), 0);
            
          
            let extraM = Math.max(distance - baseKM, 0);

            
            let fare = basefare + (extraM * perKMrate);
            
            // Apply 20% discount if the checkbox was checked
            fare = fare * (1 - 0.2 * discount);

            /*
          /*Display the final result formatted to 2 decimal places with the Peso sign */
            document.getElementById("DisplayAns").innerHTML = "₱" + fare.toFixed(2);
        });
    </script>
</body>
</html>
