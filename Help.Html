<!DOCTYPE html>
<html>
<head>
    <title>Lala Move On - Help</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="bg-dark text-white p-5 rounded shadow">

        <div class="text-center">
            <h1 class="mb-3">Customer Help and Support</h1>
            <p>Call this number for further customer service help:</p>
            <h4>0917-456-7890</h4>
        </div>

        <hr class="my-4 border-light">

        <div class="row justify-content-center">
            <div class="col-lg-6">
                <h4 class="text-center mb-4">Report Your Problem</h4>

                <form id="pickupForm">
                    <label>First Name (required):</label>
                    <input type="text" class="form-control mb-2" required autocomplete="off">

                    <label>Last Name (required):</label>
                    <input type="text" class="form-control mb-2" required autocomplete="off">

                    <label>Phone (required):</label>
                    <input type="text" class="form-control mb-2" placeholder="e.g., 0917-123-4567" required autocomplete="off">

                    <label>What is your problem?</label>
                    <textarea class="form-control mb-3" required></textarea>

                    <input type="checkbox" class="form-check-input" id="TermsandAgreement" required>
                    <label class="form-check-label" for="TermsandAgreement">
                        I have read and agree to the Terms and Conditions
                    </label>

                    <br><br>
                    <button type="submit" class="btn btn-light me-2">Submit</button>
                    <button type="reset" class="btn btn-outline-light">Clear</button>
                </form>
            </div>
        </div>
        </div>

    </div>
</div>

</body>
</html>
